server:
  port: 8080

spring:
  application:
    name: sales-management
  datasource:
    url: jdbc:h2:mem:sales_management;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

logging:
  level:
    root: info
    com.yourcompany.sales: debug

sales:
  security:
    jwt-secret: "sales-management-dev-secret-key-change-me-please-2026"
    token-expire-seconds: 7200
